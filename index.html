<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeadGen Agency</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <h2>LeadGen</h2>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </nav>
</header>

<!-- HERO WITH VIDEO BACKGROUND -->
<section class="hero">

  <video autoplay muted loop playsinline class="bg-video">
    <source src="https://cdn.coverr.co/videos/coverr-working-on-laptop-1579/1080p.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="hero-content">
    <h1>Global B2B Lead Generation That Drives Revenue</h1>

    <p>
      We provide verified B2B contacts worldwide including CEOs, founders,
      directors, and decision makers.
    </p>

    <button onclick="scrollToContact()">Get Global Leads</button>
  </div>

</section>

<!-- SERVICES -->
<section class="services">
  <h2>Our Services</h2>

  <div class="grid">
    <div class="card">Global B2B Leads</div>
    <div class="card">Email Marketing</div>
    <div class="card">SEO Growth</div>
    <div class="card">CEO Contacts</div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="contact">
  <h2>Get Leads Now</h2>

  <form onsubmit="sendMessage(event)">
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required>
    <textarea placeholder="Your Requirement" required></textarea>
    <button type="submit">Send Request</button>
  </form>

  <p id="successMsg"></p>
</section>

<footer>
  <p>© 2026 LeadGen Agency</p>
</footer>

<script src="script.js"></script>
</body>
</html>
