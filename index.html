<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeadGen Agency</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <h2>LeadGen</h2>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </nav>
</header>

<!-- HERO SECTION -->
<section class="hero">

  <!-- IMAGE SLIDER -->
  <div class="image-slider">

    <img class="slide active"
      src="https://images.unsplash.com/photo-1557804506-669a67965ba0" />

    <img class="slide"
      src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d" />

    <img class="slide"
      src="https://images.unsplash.com/photo-1556761175-4b46a572b786" />

    <img class="slide"
      src="https://images.unsplash.com/photo-1553877522-43269d4ea984" />

  </div>

  <!-- OVERLAY -->
  <div class="overlay"></div>

  <!-- HERO CONTENT -->
  <div class="hero-content">
    <h1>Global B2B Lead Generation That Drives Revenue</h1>
    <p>
      We provide verified global CEO, founder, and decision-maker contacts to help
      your business scale faster.
    </p>

    <button onclick="scrollToContact()">Get Global Leads</button>
  </div>

</section>

<!-- SERVICES -->
<section class="services">
  <h2>Our Services</h2>

  <div class="grid">
    <div class="card">Global B2B Leads</div>
    <div class="card">Email Marketing</div>
    <div class="card">SEO Growth</div>
    <div class="card">CEO Contacts</div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="contact">
  <h2>Get Leads Now</h2>

  <form onsubmit="sendMessage(event)">
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required>
    <textarea placeholder="Your Requirement" required></textarea>
    <button type="submit">Send Request</button>
  </form>

  <p id="successMsg"></p>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 LeadGen Agency</p>
</footer>

<script src="script.js"></script>
</body>
</html>
