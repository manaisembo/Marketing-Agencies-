<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeadGen Agency</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: white;
    }

    html {
      scroll-behavior: smooth;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: #111;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    .navbar a:hover {
      color: #00c3ff;
    }

    .navbar button {
      padding: 8px 15px;
      background: #00c3ff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    /* HERO */
    .hero {
      height: 80vh;
      background: url("https://images.unsplash.com/photo-1556761175-b413da4baf72") center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
    }

    .hero-content {
      position: relative;
      text-align: center;
    }

    .hero-content h1 {
      font-size: 40px;
    }

    .hero-content p {
      max-width: 600px;
      margin: auto;
      color: #ddd;
    }

    .hero-content button {
      margin-top: 15px;
      padding: 10px 20px;
      background: #00c3ff;
      border: none;
      cursor: pointer;
    }

    /* SERVICES */
    .services {
      padding: 60px 20px;
      text-align: center;
    }

    .grid {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: #141a2a;
      padding: 20px;
      width: 220px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      background: #1c2540;
    }

    /* CONTACT */
    .contact {
      padding: 60px 20px;
      text-align: center;
    }

    input, textarea {
      width: 300px;
      padding: 10px;
      margin: 8px;
    }

    button.submit {
      padding: 10px 20px;
      background: #00c3ff;
      border: none;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <h2>LeadGen</h2>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </nav>

  <button onclick="scrollToContact()">Get Leads</button>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Connect with Decision Makers</h1>
    <p>We help businesses grow with verified B2B leads and email marketing systems.</p>
    <button onclick="scrollToContact()">Start Now</button>
  </div>
</section>

<!-- SERVICES -->
<section class="services">
  <h2>What We Offer</h2>

  <div class="grid">
    <div class="card">Email Marketing</div>
    <div class="card">B2B Leads</div>
    <div class="card">SEO Growth</div>
    <div class="card">Decision Makers</div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="contact">
  <h2>Get Leads Now</h2>

  <form>
    <input type="text" placeholder="Name" required><br>
    <input type="email" placeholder="Email" required><br>
    <textarea placeholder="Requirement"></textarea><br>
    <button class="submit" type="submit">Send</button>
  </form>
</section>

<footer>
  <p>© 2026 LeadGen Agency</p>
</footer>

<script>
function scrollToContact() {
  document.getElementById("contact").scrollIntoView({ behavior: "smooth" });
}
</script>

</body>
</html>
